name: CI/CD Pipeline

on:
  push:
    branches: [main]

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: my-portfolio
  EKS_CLUSTER: my-cluster
  HELM_RELEASE: portfolio
  NAMESPACE: portfolio
  JAVA_VERSION: "21"

permissions:
  id-token: write
  contents: read

jobs:

  sast:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - uses: github/codeql-action/init@v3
        with:
          languages: java

      - run: chmod +x ./mvnw

      # ⚡ Faster: Build only once, skip tests (CodeQL doesn't need tests)
      - run: ./mvnw -q -DskipTests package

      - uses: github/codeql-action/analyze@v3


  build-and-deploy:
    runs-on: ubuntu-latest
    needs: sast

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - run: chmod +x ./mvnw

      # ⚡ Run tests + build in one step (saves 30–40 seconds)
      - name: Build & Test
        run: ./mvnw -q clean verify

      # 🔐 AWS login
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # 🐳 Build image with build cache enabled
      - name: Build Docker image
        run: |
          ECR_REGISTRY=${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG=${{ github.sha }}
          IMAGE_FULL=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

          docker build \
            --cache-from=$ECR_REGISTRY/$ECR_REPOSITORY:latest \
            -t $IMAGE_FULL .

          echo "IMAGE_FULL=$IMAGE_FULL" >> $GITHUB_ENV
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV
          echo "ECR_REGISTRY=$ECR_REGISTRY" >> $GITHUB_ENV

      # 🔍 Security scan
      - uses: aquasecurity/trivy-action@v0.24.0
        with:
          image-ref: ${{ env.IMAGE_FULL }}
          format: table
          exit-code: 1
          ignore-unfixed: true
          severity: CRITICAL,HIGH

      # 🚀 Push image
      - run: docker push $IMAGE_FULL

      # ☸️ Kubernetes access
      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region $AWS_REGION \
            --name $EKS_CLUSTER

      - name: Create namespace
        run: |
          kubectl create namespace $NAMESPACE --dry-run=client -o yaml | kubectl apply -f -

      # 🚀 Deploy with Helm
      - name: Deploy with Helm
        run: |
          helm upgrade --install $HELM_RELEASE ./helm/portfolio \
            --set image.repository=$ECR_REGISTRY/$ECR_REPOSITORY \
            --set image.tag=$IMAGE_TAG \
            --set ingress.host=portfolio.stepin.ink \
            --set service.port=8080 \
            --set service.targetPort=8080 \
            --namespace $NAMESPACE \
            --wait

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/$HELM_RELEASE \
            -n $NAMESPACE --timeout=180s

      # 🌍 Smoke test
      - name: Smoke test (ALB check)
        run: |
          ALB_URL=$(kubectl get ingress $HELM_RELEASE -n $NAMESPACE -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
          curl -f -H "Host: portfolio.stepin.ink" http://$ALB_URL || exit 1

      # 🔁 Rollback if anything fails
      - name: Rollback on failure
        if: failure()
        run: |
          helm rollback $HELM_RELEASE -n $NAMESPACE
