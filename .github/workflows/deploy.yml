name: Multi-Environment CI/CD

on:
  push:
    branches: [main]

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: my-portfolio
  EKS_CLUSTER: my-cluster
  JAVA_VERSION: "21"

permissions:
  id-token: write
  contents: read

jobs:
  # ── 🏗️ BUILD + TEST + SECURITY ───────────────────────────────
  build:
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.image.outputs.tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Run tests
        run: mvn test -q

      - name: Build JAR
        run: mvn clean package -DskipTests -q

      # ── AWS OIDC LOGIN ───────────────────────────────────────
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ── Build Docker image ───────────────────────────────────
      - name: Build Docker image
        id: image
        run: |
          ECR_REGISTRY=${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG=${{ github.sha }}

          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .

          echo "ECR_REGISTRY=$ECR_REGISTRY" >> $GITHUB_ENV
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV
          echo "tag=$IMAGE_TAG" >> $GITHUB_OUTPUT

      # ── Push image (ONLY ONCE) ───────────────────────────────
      - name: Push image to ECR
        run: |
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

  # ── 🧪 DEPLOY TO DEV ──────────────────────────────────────────
  deploy-dev:
    runs-on: ubuntu-latest
    needs: build

    environment: dev

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig (Dev cluster/namespace)
        run: |
          aws eks update-kubeconfig --name $EKS_CLUSTER --region $AWS_REGION

      - name: Deploy to DEV
        run: |
          helm upgrade --install portfolio ./helm/portfolio \
            --set image.tag=${{ needs.build.outputs.image_tag }} \
            --namespace dev --create-namespace \
            --wait

  # ── 🧪 DEPLOY TO STAGING ──────────────────────────────────────
  deploy-staging:
    runs-on: ubuntu-latest
    needs: deploy-dev

    environment: staging

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --name $EKS_CLUSTER --region $AWS_REGION

      - name: Deploy to STAGING
        run: |
          helm upgrade --install portfolio ./helm/portfolio \
            --set image.tag=${{ needs.build.outputs.image_tag }} \
            --namespace staging --create-namespace \
            --wait

  # ── 🚀 DEPLOY TO PRODUCTION (MANUAL APPROVAL) ────────────────
  deploy-prod:
    runs-on: ubuntu-latest
    needs: deploy-staging

    environment: production   # 🔥 GitHub will require approval

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --name $EKS_CLUSTER --region $AWS_REGION

      - name: Deploy to PROD
        run: |
          helm upgrade --install portfolio ./helm/portfolio \
            --set image.tag=${{ needs.build.outputs.image_tag }} \
            --namespace prod --create-namespace \
            --wait