name: CI/CD Pipeline

on:
  push:
    branches: [main]

env:
  AWS_REGION: us-east-1          
  ECR_REPOSITORY: my-portfolio  
  EKS_CLUSTER: my-cluster
  HELM_RELEASE: portfolio
  JAVA_VERSION: "21"

permissions:
  id-token: write
  contents: read

jobs:
  # ── SAST: CodeQL ────────────────────────────────────
  sast:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # FIX 2: setup-java was completely missing from this job
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java

      # FIX 3: was using bare mvn — must use ./mvnw
      - name: Build project for analysis
        run: ./mvnw clean package -DskipTests -q

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  # ── Build, Scan, Deploy ───────────────────────────────────────
  build-and-deploy:
    runs-on: ubuntu-latest
    needs: sast

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      # FIX 4: was using bare mvn — must use ./mvnw
      - name: Run tests
        run: ./mvnw test -q

      - name: Build JAR
        run: ./mvnw clean package -DskipTests -q

      # ── OWASP Dependency Scan ─────────────────────────────────
      - name: OWASP Dependency Check
        run: ./mvnw org.owasp:dependency-check-maven:check -DfailBuildOnCVSS=7 -q
        with:
          project: "portfolio"
          path: "."
          format: "HTML"
          out: "reports"

      - name: Upload Dependency Report
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: target/dependency-check-report.html

      # ── AWS Auth via OIDC ─────────────────────────────────────
      # FIX 5: aws-region now resolves correctly because AWS_REGION is uncommented
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ── Docker build ──────────────────────────────────────────
      # FIX 6: set IMAGE_FULL so Trivy and push steps can reference it easily
      - name: Build Docker image
        run: |
          ECR_REGISTRY=${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG=${{ github.sha }}
          IMAGE_FULL=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

          docker build -t $IMAGE_FULL .

          echo "ECR_REGISTRY=$ECR_REGISTRY" >> $GITHUB_ENV
          echo "IMAGE_TAG=$IMAGE_TAG"       >> $GITHUB_ENV
          echo "IMAGE_FULL=$IMAGE_FULL"     >> $GITHUB_ENV

      # ── Push image ────────────────────────────────────────────
      - name: Push Docker image
        run: docker push $IMAGE_FULL

      # ── EKS + Helm ────────────────────────────────────────────
      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region $AWS_REGION \
            --name $EKS_CLUSTER

      - name: Create namespace
        run: |
          kubectl create namespace portfolio --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy with Helm
        run: |
          helm upgrade --install $HELM_RELEASE ./helm/portfolio \
            --set image.repository=$ECR_REGISTRY/$ECR_REPOSITORY \
            --set image.tag=$IMAGE_TAG \
            --set ingress.host=portfolio.stepink.ink \
            --set service.port=8080 \
            --set service.targetPort=8080 \
            --namespace portfolio \
            --wait

      # ── Smoke test ────────────────────────────────────────────
      - name: Smoke test
        run: |
          kubectl rollout status deployment/$HELM_RELEASE \
            -n portfolio --timeout=120s
          echo "Deployment successful"